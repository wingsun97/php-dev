name: Build PHP Docker Images (Final Smart Stable)

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # Checkout（必须完整历史）
      # =========================
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =========================
      # Detect changes（可靠版）
      # =========================
      - name: Detect changes
        id: changes
        run: |
          echo "before: ${{ github.event.before }}"
          echo "after:  ${{ github.sha }}"

          core=false
          grpc=false
          devbase=false
          dev=false

          if ! git cat-file -e ${{ github.event.before }}^{commit} 2>/dev/null; then
            echo "⚠️ fallback: assume all changed"
            core=true
            grpc=true
            devbase=true
            dev=true
          else
            CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }})

            echo "changed files:"
            echo "$CHANGED"

            [[ "$CHANGED" == *"8.3-cli/Dockerfile-Core"* ]] && core=true
            [[ "$CHANGED" == *"8.3-cli/Dockerfile-Grpc"* ]] && grpc=true
            [[ "$CHANGED" == *"8.3-cli/Dockerfile-DevBase"* ]] && devbase=true
            [[ "$CHANGED" == *"8.3-cli/Dockerfile-Dev"* ]] && dev=true
          fi

          echo "core=$core" >> $GITHUB_OUTPUT
          echo "grpc=$grpc" >> $GITHUB_OUTPUT
          echo "devbase=$devbase" >> $GITHUB_OUTPUT
          echo "dev=$dev" >> $GITHUB_OUTPUT

      # =========================
      # Login GHCR
      # =========================
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # =========================
      # Smart Ensure（核心逻辑 ⭐）
      # =========================
      - name: Ensure dependency images exist (smart)
        run: |
          set -e

          REPO=ghcr.io/${{ github.repository }}

          ensure_image () {
            NAME=$1
            DOCKERFILE=$2
            CHANGED=$3

            if [ "$CHANGED" = "true" ]; then
              echo "🔥 $NAME changed → rebuild"

              docker build -t $REPO:$NAME -f $DOCKERFILE ./8.3-cli
              docker push $REPO:$NAME

            elif docker manifest inspect $REPO:$NAME > /dev/null 2>&1; then
              echo "✅ $NAME exists → skip"

            else
              echo "⚠️ $NAME missing → build"

              docker build -t $REPO:$NAME -f $DOCKERFILE ./8.3-cli
              docker push $REPO:$NAME
            fi
          }

          ensure_image "8.3-cli-core" "./8.3-cli/Dockerfile-Core" "${{ steps.changes.outputs.core }}"
          ensure_image "8.3-cli-grpc" "./8.3-cli/Dockerfile-Grpc" "${{ steps.changes.outputs.grpc }}"
          ensure_image "8.3-cli-devbase" "./8.3-cli/Dockerfile-DevBase" "${{ steps.changes.outputs.devbase }}"

      # =========================
      # Build dev（最终层）
      # =========================
      - name: Build dev image
        if: |
          steps.changes.outputs.dev == 'true' ||
          steps.changes.outputs.devbase == 'true' ||
          steps.changes.outputs.grpc == 'true' ||
          steps.changes.outputs.core == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./8.3-cli
          file: ./8.3-cli/Dockerfile-Dev
          push: true
          tags: ghcr.io/${{ github.repository }}:8.3-cli-dev

      # =========================
      # Fallback（绝不会空跑）
      # =========================
      - name: Fallback build dev
        if: |
          steps.changes.outputs.dev != 'true' &&
          steps.changes.outputs.devbase != 'true' &&
          steps.changes.outputs.grpc != 'true' &&
          steps.changes.outputs.core != 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./8.3-cli
          file: ./8.3-cli/Dockerfile-Dev
          push: true
          tags: ghcr.io/${{ github.repository }}:8.3-cli-dev