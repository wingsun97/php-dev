name: Build PHP Docker Images (Final Stable)

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Detect changes
        id: changes
        run: |
          echo "before: ${{ github.event.before }}"
          echo "after:  ${{ github.sha }}"

          # fallback（第一次 commit）
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "First commit, force build all"
            core=true
            grpc=true
            devbase=true
            dev=true
          else
            CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }})

            echo "changed files:"
            echo "$CHANGED"

            core=false
            grpc=false
            devbase=false
            dev=false

            [[ "$CHANGED" == *"8.3-cli/Dockerfile-Core"* ]] && core=true
            [[ "$CHANGED" == *"8.3-cli/Dockerfile-Grpc"* ]] && grpc=true
            [[ "$CHANGED" == *"8.3-cli/Dockerfile-DevBase"* ]] && devbase=true
            [[ "$CHANGED" == *"8.3-cli/Dockerfile-Dev"* ]] && dev=true
          fi

          echo "core=$core" >> $GITHUB_OUTPUT
          echo "grpc=$grpc" >> $GITHUB_OUTPUT
          echo "devbase=$devbase" >> $GITHUB_OUTPUT
          echo "dev=$dev" >> $GITHUB_OUTPUT

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # =========================
      # core
      # =========================
      - name: Build core
        if: steps.changes.outputs.core == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./8.3-cli
          file: ./8.3-cli/Dockerfile-Core
          push: true
          tags: ghcr.io/${{ github.repository }}:8.3-cli-core

      # =========================
      # grpc（重型）
      # =========================
      - name: Build grpc
        if: steps.changes.outputs.grpc == 'true' || steps.changes.outputs.core == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./8.3-cli
          file: ./8.3-cli/Dockerfile-Grpc
          push: true
          tags: ghcr.io/${{ github.repository }}:8.3-cli-grpc

      # =========================
      # dev-base
      # =========================
      - name: Build dev-base
        if: |
          steps.changes.outputs.devbase == 'true' ||
          steps.changes.outputs.grpc == 'true' ||
          steps.changes.outputs.core == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./8.3-cli
          file: ./8.3-cli/Dockerfile-DevBase
          push: true
          tags: ghcr.io/${{ github.repository }}:8.3-cli-devbase

      # =========================
      # dev（永远有兜底）
      # =========================
      - name: Build dev
        if: |
          steps.changes.outputs.dev == 'true' ||
          steps.changes.outputs.devbase == 'true' ||
          steps.changes.outputs.grpc == 'true' ||
          steps.changes.outputs.core == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./8.3-cli
          file: ./8.3-cli/Dockerfile-Dev
          push: true
          tags: ghcr.io/${{ github.repository }}:8.3-cli-dev

      # =========================
      # fallback（最终保险）
      # =========================
      - name: Fallback build dev (safety)
        if: |
          steps.changes.outputs.dev != 'true' &&
          steps.changes.outputs.devbase != 'true' &&
          steps.changes.outputs.grpc != 'true' &&
          steps.changes.outputs.core != 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./8.3-cli
          file: ./8.3-cli/Dockerfile-Dev
          push: true
          tags: ghcr.io/${{ github.repository }}:8.3-cli-dev
