name: Build PHP Docker Images (Core → Dev)

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  detect:
    runs-on: ubuntu-latest

    outputs:
      core: ${{ steps.filter.outputs.core }}
      grpc: ${{ steps.filter.outputs.grpc }}
      devbase: ${{ steps.filter.outputs.devbase }}
      dev: ${{ steps.filter.outputs.dev }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed files
        id: changes
        run: |
          git diff --name-only HEAD~1 HEAD > changed.txt
          cat changed.txt

      - name: Classify changes
        id: filter
        run: |
          python3 << 'EOF'
          import json

          changed = open("changed.txt").read().splitlines()

          def match(prefix):
              return any(f.startswith(prefix) for f in changed)

          # map file changes → layers
          core = match("8.3-cli/Dockerfile-Core")
          grpc = match("8.3-cli/Dockerfile-Grpc")

          # dev-base depends on dev-base changes
          devbase = match("8.3-cli/Dockerfile-DevBase")

          # dev always safe rebuild trigger if anything above changes
          dev = core or grpc or devbase or match("Dockerfile-Dev")

          print("core=" + json.dumps(core))
          print("grpc=" + json.dumps(grpc))
          print("devbase=" + json.dumps(devbase))
          print("dev=" + json.dumps(dev))
          EOF

  build-core:
    needs: detect
    if: needs.detect.outputs.core == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build core
        uses: docker/build-push-action@v5
        with:
          context: ./8.3-cli
          file: ./8.3-cli/Dockerfile-Core
          push: true
          tags: ghcr.io/${{ github.repository }}:8.3-cli-core


  build-grpc:
    needs: detect
    if: needs.detect.outputs.grpc == 'true' || needs.detect.outputs.core == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build grpc (50min isolated)
        uses: docker/build-push-action@v5
        with:
          context: ./8.3-cli
          file: ./8.3-cli/Dockerfile-Grpc
          push: true
          tags: ghcr.io/${{ github.repository }}:8.3-cli-grpc


  build-devbase:
    needs: detect
    if: needs.detect.outputs.devbase == 'true' || needs.detect.outputs.grpc == 'true' || needs.detect.outputs.core == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build dev-base (pecl + core-extra)
        uses: docker/build-push-action@v5
        with:
          context: ./8.3-cli
          file: ./8.3-cli/Dockerfile-DevBase
          push: true
          tags: ghcr.io/${{ github.repository }}:8.3-cli-devbase


  build-dev:
    needs: [detect, build-grpc, build-devbase, build-core]
    if: always() && needs.detect.outputs.dev == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build dev image
        uses: docker/build-push-action@v5
        with:
          context: ./8.3-cli
          file: ./8.3-cli/Dockerfile-Dev
          push: true
          tags: ghcr.io/${{ github.repository }}:8.3-cli-dev
