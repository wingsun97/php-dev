name: Build PHP Docker Images (Final Stable)

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # Checkout（必须 full history）
      # =========================
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =========================
      # Detect changes（稳定版）
      # =========================
      - name: Detect changes
        id: changes
        run: |
          echo "before: ${{ github.event.before }}"
          echo "after:  ${{ github.sha }}"

          core=false
          grpc=false
          devbase=false
          dev=false

          if ! git cat-file -e ${{ github.event.before }}^{commit} 2>/dev/null; then
            echo "⚠️ fallback: build all"
            core=true
            grpc=true
            devbase=true
            dev=true
          else
            CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }})

            echo "changed files:"
            echo "$CHANGED"

            [[ "$CHANGED" == *"8.3-cli/Dockerfile-Core"* ]] && core=true
            [[ "$CHANGED" == *"8.3-cli/Dockerfile-Grpc"* ]] && grpc=true
            [[ "$CHANGED" == *"8.3-cli/Dockerfile-DevBase"* ]] && devbase=true
            [[ "$CHANGED" == *"8.3-cli/Dockerfile-Dev"* ]] && dev=true
          fi

          echo "core=$core" >> $GITHUB_OUTPUT
          echo "grpc=$grpc" >> $GITHUB_OUTPUT
          echo "devbase=$devbase" >> $GITHUB_OUTPUT
          echo "dev=$dev" >> $GITHUB_OUTPUT

      # =========================
      # Login GHCR
      # =========================
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # =========================
      # Build core
      # =========================
      - name: Build core
        if: steps.changes.outputs.core == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./8.3-cli
          file: ./8.3-cli/Dockerfile-Core
          push: true
          tags: ghcr.io/${{ github.repository }}:8.3-cli-core

      # =========================
      # Build grpc
      # =========================
      - name: Build grpc
        if: steps.changes.outputs.grpc == 'true' || steps.changes.outputs.core == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./8.3-cli
          file: ./8.3-cli/Dockerfile-Grpc
          push: true
          tags: ghcr.io/${{ github.repository }}:8.3-cli-grpc

      # =========================
      # Build dev-base
      # =========================
      - name: Build dev-base
        if: |
          steps.changes.outputs.devbase == 'true' ||
          steps.changes.outputs.grpc == 'true' ||
          steps.changes.outputs.core == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./8.3-cli
          file: ./8.3-cli/Dockerfile-DevBase
          push: true
          tags: ghcr.io/${{ github.repository }}:8.3-cli-devbase

      # =========================
      # Ensure dev-base exists（关键修复 ⭐）
      # =========================
      - name: Ensure dev-base exists
        run: |
          if ! docker manifest inspect ghcr.io/${{ github.repository }}:8.3-cli-devbase > /dev/null 2>&1; then
            echo "⚠️ dev-base not found, building it now..."

            docker build \
              -t ghcr.io/${{ github.repository }}:8.3-cli-devbase \
              -f ./8.3-cli/Dockerfile-DevBase ./8.3-cli

            docker push ghcr.io/${{ github.repository }}:8.3-cli-devbase
          else
            echo "✅ dev-base exists"
          fi

      # =========================
      # Build dev（最终层）
      # =========================
      - name: Build dev
        uses: docker/build-push-action@v5
        with:
          context: ./8.3-cli
          file: ./8.3-cli/Dockerfile-Dev
          push: true
          tags: ghcr.io/${{ github.repository }}:8.3-cli-dev