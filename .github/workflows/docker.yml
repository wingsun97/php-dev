name: Build PHP Docker Images (Optimized Fast Dev)

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # Checkout
      # =========================
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =========================
      # Detect changes
      # =========================
      - name: Detect changes
        id: changes
        run: |
          core=false
          grpc=false
          devbase=false
          dev=false

          if ! git cat-file -e ${{ github.event.before }}^{commit} 2>/dev/null; then
            core=true
            grpc=true
            devbase=true
            dev=true
          else
            CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }})

            [[ "$CHANGED" == *"Dockerfile-Core"* ]] && core=true
            [[ "$CHANGED" == *"Dockerfile-Grpc"* ]] && grpc=true
            [[ "$CHANGED" == *"Dockerfile-DevBase"* ]] && devbase=true
            [[ "$CHANGED" == *"Dockerfile-Dev"* ]] && dev=true
          fi

          echo "core=$core" >> $GITHUB_OUTPUT
          echo "grpc=$grpc" >> $GITHUB_OUTPUT
          echo "devbase=$devbase" >> $GITHUB_OUTPUT
          echo "dev=$dev" >> $GITHUB_OUTPUT

      # =========================
      # Login GHCR
      # =========================
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # =========================
      # Setup buildx（开启缓存能力）
      # =========================
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # =========================
      # Smart Ensure（依赖构建）
      # =========================
      - name: Ensure dependency images exist (smart)
        run: |
          set -e
          REPO=ghcr.io/${{ github.repository }}

          ensure_image () {
            NAME=$1
            DOCKERFILE=$2
            CHANGED=$3

            if [ "$CHANGED" = "true" ]; then
              echo "🔥 $NAME changed → rebuild"
              docker build -t $REPO:$NAME -f $DOCKERFILE ./8.3-cli
              docker push $REPO:$NAME

            elif docker manifest inspect $REPO:$NAME > /dev/null 2>&1; then
              echo "✅ $NAME exists → skip"

            else
              echo "⚠️ $NAME missing → build"
              docker build -t $REPO:$NAME -f $DOCKERFILE ./8.3-cli
              docker push $REPO:$NAME
            fi
          }

          ensure_image "8.3-cli-core" "./8.3-cli/Dockerfile-Core" "${{ steps.changes.outputs.core }}"
          ensure_image "8.3-cli-grpc" "./8.3-cli/Dockerfile-Grpc" "${{ steps.changes.outputs.grpc }}"
          ensure_image "8.3-cli-devbase" "./8.3-cli/Dockerfile-DevBase" "${{ steps.changes.outputs.devbase }}"

      # =========================
      # Build dev（秒级优化版 ⭐）
      # =========================
      - name: Build dev image (fast)
        uses: docker/build-push-action@v5
        with:
          context: ./8.3-cli
          file: ./8.3-cli/Dockerfile-Dev
          push: true
          tags: ghcr.io/${{ github.repository }}:8.3-cli-dev

          # 🔥 核心优化：registry cache
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache,mode=max