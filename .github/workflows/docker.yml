name: Build PHP Docker Images (Core → Dev)

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  detect:
    runs-on: ubuntu-latest

    outputs:
      core: ${{ steps.filter.outputs.core }}
      grpc: ${{ steps.filter.outputs.grpc }}
      devbase: ${{ steps.filter.outputs.devbase }}
      dev: ${{ steps.filter.outputs.dev }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # ⭐关键修复（避免 diff 问题）

      - name: Detect changed files
        id: changes
        run: |
          git fetch origin main --depth=2 || true
          BASE=$(git merge-base origin/main HEAD || echo HEAD)
          git diff --name-only $BASE HEAD > changed.txt
          cat changed.txt

      - name: Classify changes
        id: filter
        run: |
          python3 << 'EOF'
          import json

          changed = open("changed.txt").read().splitlines()

          def match(prefix):
              return any(f.startswith(prefix) for f in changed)

          # === layer detection ===
          core = match("8.3-cli/Dockerfile-Core")
          grpc = match("8.3-cli/Dockerfile-Grpc")
          devbase = match("8.3-cli/Dockerfile-DevBase")
          dev = match("8.3-cli/Dockerfile-Dev")

          # === safety fallback (VERY IMPORTANT) ===
          if not changed:
              core = grpc = devbase = dev = True

          # dev always rebuild if anything changes
          dev = core or grpc or devbase or dev

          # output MUST be lowercase string
          print("core=" + str(core).lower())
          print("grpc=" + str(grpc).lower())
          print("devbase=" + str(devbase).lower())
          print("dev=" + str(dev).lower())
          EOF

  build-core:
    needs: detect
    if: needs.detect.outputs.core == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build core
        uses: docker/build-push-action@v5
        with:
          context: ./8.3-cli
          file: ./8.3-cli/Dockerfile-Core
          push: true
          tags: ghcr.io/${{ github.repository }}:8.3-cli-core


  build-grpc:
    needs: detect
    if: needs.detect.outputs.grpc == 'true' || needs.detect.outputs.core == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build grpc (50min isolated)
        uses: docker/build-push-action@v5
        with:
          context: ./8.3-cli
          file: ./8.3-cli/Dockerfile-Grpc
          push: true
          tags: ghcr.io/${{ github.repository }}:8.3-cli-grpc


  build-devbase:
    needs: detect
    if: needs.detect.outputs.devbase == 'true' || needs.detect.outputs.grpc == 'true' || needs.detect.outputs.core == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build dev-base
        uses: docker/build-push-action@v5
        with:
          context: ./8.3-cli
          file: ./8.3-cli/Dockerfile-DevBase
          push: true
          tags: ghcr.io/${{ github.repository }}:8.3-cli-devbase


  build-dev:
    needs: detect
    if: needs.detect.outputs.dev == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build dev image
        uses: docker/build-push-action@v5
        with:
          context: ./8.3-cli
          file: ./8.3-cli/Dockerfile-Dev
          push: true
          tags: ghcr.io/${{ github.repository }}:8.3-cli-dev
