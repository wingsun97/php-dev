name: Build & Push PHP Develop Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push php 8.3 cli alpine image
        uses: docker/build-push-action@v5
        with:
          context: ./8.3-cli
          file: ./8.3-cli/Dockerfile-Alpine
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:8.3.30-cli
            ghcr.io/${{ github.repository }}:8.3.30-cli-alpine

      - name: Build and push php 8.3 cli debian image
        uses: docker/build-push-action@v5
        with:
          context: ./8.3-cli
          file: ./8.3-cli/Dockerfile-Debian
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:8.3-cli
            ghcr.io/${{ github.repository }}:8.3-cli-bookworm

      - name: Build and push php 8.3 cli + core image
        uses: docker/build-push-action@v5
        with:
          context: ./8.3-cli
          file: ./8.3-cli/Dockerfile-Core
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:8.3-cli-core

      - name: Build and push php 8.3 cli + core extra image
        uses: docker/build-push-action@v5
        with:
          context: ./8.3-cli
          file: ./8.3-cli/Dockerfile-Core-Extra
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:8.3-cli-extra

      - name: Build and push php 8.3 cli + grpc image
        uses: docker/build-push-action@v5
        with:
          context: ./8.3-cli
          file: ./8.3-cli/Dockerfile-Grpc
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:8.3-cli-grpc

      - name: Build and push php 8.3 cli + pecl image
        uses: docker/build-push-action@v5
        with:
          context: ./8.3-cli
          file: ./8.3-cli/Dockerfile-Pecl
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:8.3-cli-pecl

      - name: Build and push php 8.3 cli + develop image
        uses: docker/build-push-action@v5
        with:
          context: ./8.3-cli
          file: ./8.3-cli/Dockerfile-Dev
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:8.3-cli-dev
